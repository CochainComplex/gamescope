name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Prepare
        run: |
          pacman-key --init
          pacman -Syu --noconfirm
          pacman -S --noconfirm git meson clang glslang libcap wlroots0.19 \
            sdl2 vulkan-headers libx11 libxmu libxcomposite libxrender libxres \
            libxtst libxkbcommon libdrm libinput wayland-protocols benchmark \
            xorg-xwayland pipewire cmake \
            libavif libheif aom rav1e libdecor libxdamage \
            luajit python shellcheck \
            catch2 gcovr
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Check framegen maintenance tooling
        run: |
          bash -n env-gamescope-local.sh test-framegen.sh \
            scripts/framegen-launch-common.sh watch-framegen.sh run-framegen-native.sh
          shellcheck -x env-gamescope-local.sh test-framegen.sh \
            scripts/framegen-launch-common.sh watch-framegen.sh run-framegen-native.sh
          PYTHONPYCACHEPREFIX=/tmp/gamescope-pycache \
            python3 -m py_compile scripts/framegen-net-train.py \
              scripts/framegen-net-eval.py scripts/framegen-color-eval.py
          if git grep -nE '/home/[[:alnum:]_.-]+/' -- \
            README.md doc/framegen-architecture.md doc/framegen-howto.md \
            doc/framegen-maintenance.md doc/framegen-proposals \
            env-gamescope-local.sh test-framegen.sh watch-framegen.sh \
            run-framegen-native.sh scripts/framegen-\*.py \
            scripts/framegen-launch-common.sh; then
            echo 'Machine-specific home path found in a published framegen file.' >&2
            exit 1
          fi
      - name: Build with gcc
        run: |
          export CC=gcc CXX=g++
          meson setup build-gcc/ -Dinput_emulation=disabled --werror --auto-features=enabled
          ninja -C build-gcc/
      - name: Build with gcc (no vr)
        run: |
          export CC=gcc CXX=g++
          meson setup build-gcc-novr/ -Dinput_emulation=disabled -Denable_openvr_support=false --werror --auto-features=enabled
          ninja -C build-gcc-novr/
#      - name: Build with clang
#        run: |
#          export CC=clang CXX=clang++
#          meson setup build-clang/ -Dinput_emulation=disabled --werror --auto-features=enabled
#          ninja -C build-clang/
      - name: Run unit tests and collect coverage
        run: |
          export CC=gcc CXX=g++
          meson configure -Db_coverage=true build-gcc
          meson test -C build-gcc --suite gamescope -v
          gcovr -f src --xml -o coverage.xml -s build-gcc
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: code coverage
          path: coverage.xml
